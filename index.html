<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>الاختبار المتكامل</title>
    <style>
        /* نفس التنسيق السابق */
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); direction: rtl; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 20px; padding: 25px; }
        .passage { background: #f0f7ff; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-right: 5px solid #007bff; }
        .question { font-weight: bold; margin: 20px 0 15px; }
        .option { display: block; margin: 10px 0; padding: 10px; background: #eef2f5; border-radius: 12px; cursor: pointer; }
        .option.selected { background: #007bff; color: white; }
        .feedback { margin: 15px 0; padding: 10px; border-radius: 12px; }
        .feedback.correct { background: #d4edda; color: #155724; }
        .feedback.wrong { background: #f8d7da; color: #721c24; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-left: 10px; }
        #next-btn { background: #007bff; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align:center">📝 اختبار اللغة الإنجليزية</h1>
    <div id="progress" style="text-align:center; margin-bottom:20px"></div>
    <div id="quiz-container"></div>
    <div style="text-align:center">
        <button id="submit-btn">إرسال الإجابة</button>
        <button id="next-btn" style="display:none;">التالي</button>
    </div>
</div>

<script>
    let questions = [];
    let current = 0;
    let selected = null;

    const passages = {
        hassan: `📖 النص الأول: Hassan\n\nHassan is a boy who loves technology. He lives in a modern city with his family. Every day, he spends time on his computer learning new things. He enjoys using different programs and discovering how they work. Hassan’s favorite activity is designing simple games. On weekends, Hassan watches videos about technology and learns new skills. He also helps his friends fix small problems with their computers. Hassan likes to explore new ideas and try them by himself. Sometimes, he joins online classes to improve his knowledge. His teachers are proud of him. Learning about technology makes Hassan excited and happy!`,
        khalid: `📖 النص الثاني: Khalid\n\nKhalid is a boy who loves animals. He lives in a small house with his family. Every day, he takes care of his pet dog. He feeds it, plays with it, and takes it for a walk in the park. Khalid’s favorite animal is the dog because it is friendly and loyal. On weekends, Khalid visits a nearby farm with his father. He enjoys watching different animals like cows, chickens, and horses. Khalid also reads books about animals to learn more about them. Sometimes, he helps his neighbors take care of their pets. They trust him because he is kind and responsible. Taking care of animals makes Khalid feel happy and proud!`,
        amal: `📖 النص الثالث: Amal\n\nAmal is in Egypt, and she is having a great time. Cairo is a very interesting city. There are lots of things to see and do. Yesterday she went on a boat ride down the Nile. It’s a wonderful way to explore the city. It was a hot day, but it was a great experience for her. She went out for dinner with her family at an Egyptian restaurant. She loves Egyptian food, it’s delicious! Tomorrow she is going to visit the Pyramids. She is also going to ride on camels.`
    };

    function showPassageIfNeeded(text) {
        if (text.includes("Hassan") && (text.includes("love") || text.includes("favorite") || text.includes("help") || text.includes("feel")))
            return `<div class="passage">${passages.hassan}</div>`;
        if (text.includes("Khalid") && (text.includes("love") || text.includes("do every day") || text.includes("favorite") || text.includes("weekends") || text.includes("read") || text.includes("feel")))
            return `<div class="passage">${passages.khalid}</div>`;
        if (text.includes("Amal") || text.includes("her in line") || text.includes("Tomorrow she") || text.includes("main idea") || text.includes("city was cold") || text.includes("ride on camels"))
            return `<div class="passage">${passages.amal}</div>`;
        return '';
    }

    async function load() {
        const res = await fetch('questions.json');
        questions = await res.json();
        showQuestion();
    }

    function showQuestion() {
        const q = questions[current];
        document.getElementById('progress').innerHTML = `السؤال ${current+1} من ${questions.length}`;
        let html = showPassageIfNeeded(q.text);
        html += `<div class="question">${q.text}</div>`;
        q.options.forEach((opt, i) => {
            const letter = String.fromCharCode(65+i);
            html += `<div class="option" data-letter="${letter}">${letter}. ${opt}</div>`;
        });
        html += '<div id="feedback"></div>';
        document.getElementById('quiz-container').innerHTML = html;
        document.querySelectorAll('.option').forEach(opt => {
            opt.onclick = () => {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selected = opt.dataset.letter;
            };
        });
        document.getElementById('submit-btn').style.display = 'inline-block';
        document.getElementById('next-btn').style.display = 'none';
        selected = null;
    }

    document.getElementById('submit-btn').onclick = () => {
        if (!selected) return alert('اختر إجابة');
        const q = questions[current];
        const fb = document.getElementById('feedback');
        if (selected === q.correct) {
            fb.innerHTML = `<div class="feedback correct">✅ صحيح! ${q.explanation[selected]}</div>`;
        } else {
            fb.innerHTML = `<div class="feedback wrong">❌ خطأ. ${q.explanation[selected]}<br><strong>الصحيح: ${q.correct}</strong> — ${q.explanation[q.correct]}</div>`;
        }
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'inline-block';
    };

    document.getElementById('next-btn').onclick = () => {
        current++;
        if (current < questions.length) showQuestion();
        else document.getElementById('quiz-container').innerHTML = '<h2>🎉 انتهى الاختبار</h2>';
    };

    load();
</script>
</body>
</html>
