<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Goal – نظام وحدات قابل للتوسع</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1e5a3a, #0f2a1c);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .toolbar {
            background: #2b7a4b;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-wrap: wrap;
            gap: 10px;
        }
        .toolbar button {
            background: white;
            color: #2b7a4b;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .toolbar button:hover {
            background: #f0f0f0;
            transform: scale(1.02);
        }
        .unit-tabs {
            display: flex;
            background: #eaf7ed;
            border-bottom: 2px solid #b8d9c2;
            overflow-x: auto;
        }
        .unit-tab {
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            background: #eaf7ed;
            color: #1e5a3a;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
        }
        .unit-tab.active {
            background: white;
            border-bottom-color: #2b7a4b;
            color: #2b7a4b;
        }
        .sub-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        .sub-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            background: #f8f9fa;
            color: #2c3e6d;
            font-weight: bold;
        }
        .sub-tab.active {
            background: white;
            border-bottom: 3px solid #2b7a4b;
            color: #2b7a4b;
        }
        .content { padding: 25px; }
        h2 { color: #1e5a3a; margin-bottom: 15px; }
        .progress-area { margin-bottom: 20px; }
        .passage {
            background: #fef5e8;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            border-right: 6px solid #ff8c42;
            line-height: 1.7;
            font-size: 0.95rem;
        }
        .question {
            background: #fef5e8;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .option {
            background: #f8f9fa;
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .option.selected { background: #2b7a4b; color: white; }
        .feedback { margin: 15px 0; padding: 12px; border-radius: 16px; }
        .feedback.correct { background: #d4edda; color: #155724; }
        .feedback.wrong { background: #f8d7da; color: #721c24; }
        button {
            background: #2b7a4b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .writing-box, .grammar-box {
            background: #fef9e6;
            padding: 20px;
            border-radius: 24px;
        }
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .container {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
            }
            .toolbar, .unit-tabs, .sub-tabs, .nav-buttons, button, footer, .progress-area, .feedback, #submit-btn, #next-btn, #prev-btn {
                display: none !important;
            }
            .content {
                padding: 0.5cm;
            }
            .question {
                background: none;
                border: 1px solid #ccc;
                page-break-inside: avoid;
            }
            .option {
                background: none;
                border: 1px solid #ddd;
                page-break-inside: avoid;
            }
            h2 {
                color: black;
            }
        }
        footer { text-align: center; margin-top: 20px; font-size: 0.75rem; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="toolbar">
        <span><i class="fas fa-graduation-cap"></i> Super Goal – وحدات 11-12-13</span>
        <div>
            <button id="print-pdf"><i class="fas fa-print"></i> طباعة تفاعلية</button>
            <button id="print-exam"><i class="fas fa-file-pdf"></i> 📄 طباعة الأسئلة (نسخة ورقية)</button>
        </div>
    </div>
    <div class="unit-tabs" id="unit-tabs"></div>
    <div class="sub-tabs" id="sub-tabs" style="display:none;"></div>
    <div class="content">
        <h2 id="mode-title"></h2>
        <div id="quiz-container"></div>
        <div class="nav-buttons">
            <button id="prev-btn" style="display:none;"><i class="fas fa-arrow-right"></i> السابق</button>
            <button id="submit-btn" style="display:none;">إرسال الإجابة ✅</button>
            <button id="next-btn" style="display:none;">التالي <i class="fas fa-arrow-left"></i></button>
        </div>
        <footer>✨ نظام وحدات قابل للتوسع – أضف وحدة جديدة بإنشاء مجلد وإضافة اسمه في config.json ✨</footer>
    </div>
</div>

<script>
    let config = { units: [] };
    let currentUnit = null;
    let currentSubMode = 'full';
    let questions = [];
    let currentIndex = 0, selectedAnswer = null, score = 0;

    // نص القراءة للوحدة 11 (Maria & Sara)
    const readingPassage = `📖 <strong>النص: Maria and her sister Sara</strong><br><br>
    My name is Maria and I’m fourteen years old. I’ve got a problem with my sister. Her name is Sara and she is six years old. You see, every Saturday morning our parents go shopping and I do the housework. I always tidy my room, hoover the flat and do the washing-up. My sister doesn’t help out at all. She always watches TV and plays computer games. She never takes out the rubbish or washes the car. She’s so lazy! Anyway, when my parents come home we always argue about the housework. I want to watch TV and play computer games, too. I hate weekends!`;

    function showPassageIfNeeded(questionText) {
        // إذا كان السؤال يتعلق بنص Maria و Sara
        if (questionText.includes("Maria") || questionText.includes("Sara") || 
            questionText.includes("active") || questionText.includes("trash") ||
            questionText.includes("main idea") || questionText.includes("parents go shopping") ||
            questionText.includes("wants to swim")) {
            return `<div class="passage">${readingPassage}</div>`;
        }
        return '';
    }

    async function loadConfig() {
        const res = await fetch('config.json');
        config = await res.json();
        renderUnitTabs();
        if (config.units.length) loadUnit(config.units[0]);
    }

    function renderUnitTabs() {
        const container = document.getElementById('unit-tabs');
        container.innerHTML = '';
        config.units.forEach((unit, idx) => {
            const tab = document.createElement('div');
            tab.className = 'unit-tab';
            if (idx === 0) tab.classList.add('active');
            tab.innerText = unit.title;
            tab.onclick = () => {
                document.querySelectorAll('.unit-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadUnit(unit);
            };
            container.appendChild(tab);
        });
    }

    async function loadUnit(unit) {
        currentUnit = unit;
        currentSubMode = 'full';
        document.getElementById('sub-tabs').style.display = 'flex';
        renderSubTabs();
        await loadSubMode();
    }

    function renderSubTabs() {
        const container = document.getElementById('sub-tabs');
        container.innerHTML = `
            <div class="sub-tab" data-mode="full">📚 شامل (قواعد + مفردات + قراءة)</div>
            <div class="sub-tab" data-mode="vocab">📖 مفردات الوحدة</div>
            <div class="sub-tab" data-mode="writing">✍️ الكتابة</div>
            <div class="sub-tab" data-mode="grammar">📘 شرح القواعد</div>
        `;
        document.querySelectorAll('.sub-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentSubMode = tab.getAttribute('data-mode');
                loadSubMode();
            };
        });
        document.querySelector('.sub-tab[data-mode="full"]').classList.add('active');
    }

    async function loadSubMode() {
        if (currentSubMode === 'writing') {
            await loadWritingSection();
            return;
        }
        if (currentSubMode === 'grammar') {
            await loadGrammarSection();
            return;
        }
        const fileName = (currentSubMode === 'full') ? 'questions.json' : 'vocabulary.json';
        const filePath = `units/${currentUnit.id}/${fileName}`;
        try {
            const res = await fetch(filePath);
            if (!res.ok) throw new Error(`الملف ${fileName} غير موجود للوحدة ${currentUnit.id}`);
            questions = await res.json();
            currentIndex = 0; score = 0;
            renderQuizInterface();
            showQuestion();
            document.getElementById('submit-btn').style.display = 'inline-block';
            document.getElementById('prev-btn').style.display = 'none';
        } catch(err) {
            document.getElementById('quiz-container').innerHTML = `<div style="color:red;">⚠️ ${err.message}</div>`;
        }
    }

    function renderQuizInterface() {
        document.getElementById('mode-title').innerHTML = `${currentUnit.title} – ${currentSubMode === 'full' ? 'اختبار شامل' : 'مفردات'}`;
        document.getElementById('quiz-container').innerHTML = '<div id="quiz-area"></div><div id="feedback"></div>';
        document.getElementById('submit-btn').style.display = 'inline-block';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('prev-btn').style.display = 'none';
    }

    function showQuestion() {
        const q = questions[currentIndex];
        const container = document.getElementById('quiz-area');
        let html = showPassageIfNeeded(q.text);
        html += `<div class="question">${q.text}</div>`;
        const letters = ['A','B','C','D'];
        q.options.forEach((opt,i) => {
            html += `<div class="option" data-letter="${letters[i]}">${letters[i]}. ${opt}</div>`;
        });
        container.innerHTML = html;
        attachOptionEvents();
        updateProgress();
        updateNavButtons();
    }

    function attachOptionEvents() {
        document.querySelectorAll('.option').forEach(opt => {
            opt.onclick = () => {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedAnswer = opt.getAttribute('data-letter');
            };
        });
    }

    function updateProgress() {
        const percent = ((currentIndex) / questions.length) * 100;
        const progressHtml = `<div style="display:flex; justify-content:space-between;"><span>السؤال ${currentIndex+1} / ${questions.length}</span><span>⭐ النقاط: ${score}</span></div><div style="background:#ddd; border-radius:20px; height:8px;"><div style="background:#2b7a4b; width:${percent}%; height:8px; border-radius:20px;"></div></div>`;
        const existing = document.querySelector('.progress-area');
        if (existing) existing.remove();
        const div = document.createElement('div');
        div.className = 'progress-area';
        div.innerHTML = progressHtml;
        document.getElementById('quiz-container').insertBefore(div, document.getElementById('quiz-area'));
    }

    function updateNavButtons() {
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        if (currentIndex > 0) prevBtn.style.display = 'inline-block';
        else prevBtn.style.display = 'none';
        if (currentIndex < questions.length - 1) nextBtn.style.display = 'inline-block';
        else nextBtn.style.display = 'none';
    }

    document.getElementById('submit-btn').onclick = () => {
        if (!selectedAnswer) { alert('اختر إجابة'); return; }
        const q = questions[currentIndex];
        const isCorrect = (selectedAnswer === q.correct);
        const fbDiv = document.getElementById('feedback');
        if (isCorrect) {
            score++;
            fbDiv.innerHTML = `<div class="feedback correct">✅ صحيح! ${q.explanation[selectedAnswer]}</div>`;
        } else {
            fbDiv.innerHTML = `<div class="feedback wrong">❌ خطأ. ${q.explanation[selectedAnswer]}<br>✅ الصحيح: ${q.correct} — ${q.explanation[q.correct]}</div>`;
        }
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'inline-block';
        updateProgress();
    };

    document.getElementById('next-btn').onclick = () => {
        currentIndex++;
        showQuestion();
        document.getElementById('submit-btn').style.display = 'inline-block';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('feedback').innerHTML = '';
        selectedAnswer = null;
        updateProgress();
    };

    document.getElementById('prev-btn').onclick = () => {
        currentIndex--;
        showQuestion();
        document.getElementById('submit-btn').style.display = 'inline-block';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('feedback').innerHTML = '';
        selectedAnswer = null;
        updateProgress();
    };

    async function loadWritingSection() {
        const filePath = `units/${currentUnit.id}/writing.json`;
        let writingData = { prompts: [], model: "" };
        try {
            const res = await fetch(filePath);
            if (res.ok) writingData = await res.json();
        } catch(e) { console.log("لا يوجد ملف writing.json"); }
        const html = `
            <div class="writing-box">
                <h3>📝 ${writingData.title || "دليل كتابة الموضوع"}</h3>
                ${writingData.steps ? writingData.steps.map(step => `<div style="margin-bottom:15px;"><strong>الخطوة ${step.step}: ${step.title}</strong><br>${step.explanation}</div>`).join('') : `<p>${writingData.prompts ? writingData.prompts.join('<br>') : "اكتب فقرة عن قطعة الملابس المفضلة لديك"}</p>`}
                ${writingData.model ? `<div style="background:#e9ecef; padding:12px; border-radius:16px; margin-top:15px;"><strong>نموذج إجابة:</strong><br>${writingData.model}</div>` : ''}
                <textarea id="student-writing" rows="8" style="width:100%; margin:15px 0; padding:10px; border-radius:16px;"></textarea>
                <button id="save-writing">💾 حفظ مسودتك</button>
                <div id="writing-feedback" style="margin-top:15px;"></div>
            </div>
        `;
        document.getElementById('quiz-container').innerHTML = html;
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('prev-btn').style.display = 'none';
        document.getElementById('save-writing').onclick = () => {
            const text = document.getElementById('student-writing').value;
            localStorage.setItem(`writing_${currentUnit.id}`, text);
            document.getElementById('writing-feedback').innerHTML = '✅ تم حفظ كتابتك محلياً.';
        };
    }

    async function loadGrammarSection() {
        const filePath = `units/${currentUnit.id}/grammar.json`;
        let grammarData = {};
        try {
            const res = await fetch(filePath);
            if (!res.ok) throw new Error('لا يوجد ملف شرح القواعد لهذه الوحدة');
            grammarData = await res.json();
        } catch(e) {
            document.getElementById('quiz-container').innerHTML = `<div class="grammar-box" style="color:red;">⚠️ ${e.message}<br>يمكنك إضافة ملف grammar.json داخل مجلد الوحدة لعرض شرح القواعد.</div>`;
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('prev-btn').style.display = 'none';
            return;
        }
        let html = `<div class="grammar-box">`;
        html += `<h2>${grammarData.title || "📘 شرح قواعد الوحدة"}</h2>`;
        if (grammarData.topics && grammarData.topics.length) {
            grammarData.topics.forEach(topic => {
                html += `<div style="margin-bottom:25px; border-bottom:1px solid #e9ecef; padding-bottom:15px;">`;
                html += `<h3>${topic.name}</h3>`;
                if (topic.rule) html += `<p><strong>📌 القاعدة:</strong> ${topic.rule}</p>`;
                if (topic.form) html += `<p><strong>🔧 الصيغة:</strong> ${topic.form}</p>`;
                if (topic.examples && topic.examples.length) {
                    html += `<ul>`;
                    topic.examples.forEach(ex => html += `<li>📌 ${ex}</li>`);
                    html += `</ul>`;
                }
                if (topic.table) html += `<div>${topic.table}</div>`;
                if (topic.adverbs_table) html += `<div>${topic.adverbs_table}</div>`;
                html += `</div>`;
            });
        } else {
            html += `<p>لا توجد تفاصيل قواعد لهذه الوحدة بعد. يمكنك إضافتها في ملف grammar.json.</p>`;
        }
        html += `</div>`;
        document.getElementById('quiz-container').innerHTML = html;
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('prev-btn').style.display = 'none';
    }

    // زر الطباعة التفاعلي (نسخة الشاشة)
    document.getElementById('print-pdf').addEventListener('click', () => {
        window.print();
    });

    // زر طباعة الأسئلة (نسخة ورقية) - يطبع أسئلة الاختبار الشامل فقط (بدون المفردات)
    document.getElementById('print-exam').addEventListener('click', async () => {
        const examFilePath = `units/${currentUnit.id}/questions.json`;
        let examQuestions = [];
        try {
            const res = await fetch(examFilePath);
            if (!res.ok) throw new Error('لا توجد أسئلة للطباعة');
            examQuestions = await res.json();
        } catch(err) {
            alert('لا يمكن تحميل أسئلة الامتحان للطباعة.');
            return;
        }
        if (!examQuestions.length) {
            alert('لا توجد أسئلة للطباعة.');
            return;
        }
        let printWindow = window.open('', '_blank');
        let htmlContent = `<!DOCTYPE html>
        <html dir="rtl" lang="ar">
        <head>
            <meta charset="UTF-8">
            <title>امتحان ${currentUnit.title} – أسئلة فقط</title>
            <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body {
                    font-family: 'Segoe UI', 'Tajawal', sans-serif;
                    direction: rtl;
                    padding: 1.5cm;
                    background: white;
                    color: black;
                }
                h1 {
                    font-size: 1.8rem;
                    text-align: center;
                    margin-bottom: 0.5rem;
                    color: #1e5a3a;
                }
                .subtitle {
                    text-align: center;
                    margin-bottom: 1.5rem;
                    font-size: 1rem;
                    color: #555;
                }
                .question-item {
                    margin-bottom: 1.2rem;
                    page-break-inside: avoid;
                }
                .question-text {
                    font-weight: bold;
                    font-size: 1rem;
                    margin-bottom: 0.3rem;
                }
                .options {
                    margin-right: 1.5rem;
                    margin-bottom: 0.5rem;
                }
                .option {
                    margin: 0.2rem 0;
                }
                .answer-line {
                    margin-top: 0.3rem;
                    border-bottom: 1px dotted #aaa;
                    width: 60px;
                    display: inline-block;
                    margin-right: 10px;
                }
                hr {
                    margin: 1rem 0;
                    border: 0;
                    border-top: 1px solid #eee;
                }
                @media print {
                    body {
                        padding: 0.8cm;
                    }
                    .question-item {
                        break-inside: avoid;
                    }
                }
            </style>
        </head>
        <body>
            <h1>📝 ${currentUnit.title}</h1>
            <div class="subtitle">الاسم: ________________________ | التاريخ: ___________</div>
            <div class="subtitle">عدد الأسئلة: ${examQuestions.length}</div>
            <hr>
        `;
        examQuestions.forEach((q, idx) => {
            htmlContent += `
            <div class="question-item">
                <div class="question-text">${idx+1}. ${q.text}</div>
                <div class="options">
                    ${q.options.map((opt, optIdx) => {
                        const letter = String.fromCharCode(65+optIdx);
                        return `<div class="option">${letter}. ${opt}</div>`;
                    }).join('')}
                </div>
                <div>الإجابة: <span class="answer-line"></span></div>
            </div>
            <hr>
            `;
        });
        htmlContent += `
            <div style="margin-top: 1.5rem; font-size: 0.8rem; text-align: center;">
                تمنياتنا لك بالتوفيق
            </div>
        </body>
        </html>`;
        printWindow.document.write(htmlContent);
        printWindow.document.close();
        printWindow.print();
    });

    loadConfig();
</script>
</body>
</html>
